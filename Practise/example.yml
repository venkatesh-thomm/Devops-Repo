apiVersion: apps/v1
kind: Deployment
metadata: 
  name: frontend 
  namespace: demo
  labels:
    project: roboshop
    component: frontend 
spec:
    replicas: 5 
    selector:
      matchLabels:
        project: roboshop
        component: frontend   
    template:
      metadata:
        labels:
          project: roboshop
          component: frontend
      spec:
        containers:
          - name: nginx 
            image: nginx:latest 
            ports:
              - containerPort: 80

            resources:
              requests:
                cpu : "150m"
                memory: "200Mi"
              limits: 
                cpu : "200m"
                memory: "300Mi"
            livenessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 10
              periodSeconds: 10 
            readinessProbe:
              httpGet:
                path: /
                port: 80
              initialDelaySeconds: 15
              periodSeconds: 15  


---
apiVersion: autoscaler/v2
kind: HorizontalPodAutoscaler 
metadata:
  name: frontend-hpa
  namespace: demo 
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment 
    n  
                     

                  