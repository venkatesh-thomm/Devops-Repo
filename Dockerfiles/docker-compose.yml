version: "3.9"

# Use '&' to define the anchor (template)
x-resource-limits: &default-resources
  resources:
    limits:
      cpus: "0.50" # Max limit (e.g., 0.5 cores)
      memory: "512M" # Max memory
    reservations:
      cpus: "0.25" # Guaranteed minimum
      memory: "128M" # Guaranteed minimum

services:
  app:
    build: ./
    image: my-custom:1.20
    ports:
      - "8081:8080"
    environment:
      app: production
    depends_on:
      - db
    deploy: *default-resources # Use '*' to reference the anchor

  web:
    image: nginx:latest
    ports:
      - "8080:80"
    environment:
      app: production
    volumes:
      - html:/usr/share/nginx/html
    deploy: *default-resources

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password # Required for MySQL
    volumes:
      - db_data:/var/lib/mysql
    deploy: *default-resources

volumes:
  html:
  db_data:
